<style>
  :root {
    --yellow: #f8b500;
    --teal:   #40e0d0;
    --salmon: #f3a696;
    --bg:     #fafaf8;
    --surface:#ffffff;
    --surface2:#f4f2ee;
    --border: #e8e4dc;
    --text:   #2a2420;
    --text2:  #6a6460;
    --text3:  #b0aa9f;
    --danger: #e05050;
    --font: 'Hiragino Kaku Gothic ProN','ヒラギノ角ゴ ProN','Meiryo','メイリオ',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:19px;}

  /* ===== RESPONSIVE BASE ===== */
  @media(max-width:480px){
    body{font-size:16px;}
    .wh-layout,.today-layout,.diary-layout{grid-template-columns:1fr!important;}
    .board-cols{grid-template-columns:1fr!important;}
    .main{padding:14px 12px;}
    .header{padding:10px 12px;flex-wrap:nowrap;gap:6px;}
    .header h1{font-size:16px;white-space:nowrap;}
    .header-right{gap:6px;flex-shrink:0;}
    .date-display{font-size:11px;white-space:nowrap;}
    .btn-header{font-size:10px;padding:4px 7px;}
    .btn-header-exportimport{display:none;}
    .save-indicator{font-size:10px;padding:2px 6px;}
    .nav{padding:0 4px;}
    .nav-btn{padding:10px 8px;font-size:12px;}
    .task-actions{opacity:1;}
  }
  @media(max-width:768px){
    .today-layout{display:flex;flex-direction:column;}
    .today-layout .board-cols{order:1;}
    .today-layout .panel{order:2;}
  }

  /* ===== HEADER ===== */
  .header{
    background: linear-gradient(135deg, #f8b500 0%, #f3a696 50%, #40e0d0 100%);
    padding:16px 28px;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:200;
    box-shadow:0 2px 12px rgba(248,181,0,0.3);
  }
  .header h1{font-size:22px;color:#fff;font-weight:700;letter-spacing:0.08em;text-shadow:0 1px 3px rgba(0,0,0,0.15);}
  .header-right{display:flex;align-items:center;gap:16px;}
  .date-display{font-size:14px;color:rgba(255,255,255,0.9);font-weight:600;}
  .save-indicator{font-size:12px;color:#fff;background:rgba(255,255,255,0.3);padding:3px 10px;border-radius:12px;opacity:0;transition:opacity 0.4s;}
  .save-indicator.show{opacity:1;}
  .btn-header{background:rgba(255,255,255,0.25);border:1.5px solid rgba(255,255,255,0.5);color:#fff;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all 0.15s;}
  .btn-header:hover{background:rgba(255,255,255,0.4);}
  @media(max-width:768px){.btn-header{font-size:11px;padding:4px 8px;}}

  /* ===== ALERT ===== */
  .alert-banner{background:linear-gradient(135deg,var(--salmon),#e05050);color:#fff;padding:10px 28px;font-size:14px;font-weight:700;display:none;gap:10px;align-items:center;}
  .alert-banner.show{display:flex;}
  .alert-close{margin-left:auto;background:none;border:none;color:#fff;cursor:pointer;font-size:20px;}

  /* ===== DIRECT TASK BORDER ===== */
  .task-item.direct-task{border-left:4px solid var(--teal);}



  /* ===== SEARCH ===== */
  .search-bar{background:#fff;border-bottom:2px solid var(--border);padding:10px 20px 0;display:none;position:sticky;top:64px;z-index:190;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
  .search-bar.open{display:block;}
  .search-bar-row{display:flex;align-items:center;gap:8px;}
  .search-inp{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:9px 14px;font-size:15px;font-family:var(--font);outline:none;transition:border-color 0.15s;}
  .search-inp:focus{border-color:var(--teal);}
  .search-close{background:none;border:none;font-size:18px;color:var(--text3);cursor:pointer;padding:4px 8px;}
  .search-results{max-height:340px;overflow-y:auto;padding:8px 0 10px;}
  .search-result-item{padding:10px 12px;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;gap:3px;transition:background 0.12s;border:1.5px solid transparent;margin-bottom:4px;}
  .search-result-item:hover{background:rgba(64,224,208,0.07);border-color:rgba(64,224,208,0.3);}
  .search-result-name{font-size:15px;font-weight:600;color:var(--text);}
  .search-result-name mark{background:rgba(248,181,0,0.35);border-radius:3px;padding:0 2px;}
  .search-result-meta{font-size:12px;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap;}
  .search-empty{text-align:center;color:var(--text3);font-size:14px;padding:24px 0;}

  /* ===== NAV ===== */
  .nav{
    display:flex;background:var(--surface);
    border-bottom:3px solid var(--border);
    padding:0 28px;
    box-shadow:0 1px 6px rgba(0,0,0,0.06);
  }
  .nav-btn{
    padding:14px 22px;background:none;border:none;
    color:var(--text2);cursor:pointer;
    font-family:var(--font);font-size:19px;font-weight:600;
    border-bottom:3px solid transparent;
    transition:all 0.2s;position:relative;top:3px;
  }
  @media(max-width:768px){.nav-btn{font-size:13px;padding:11px 10px;}}
  .nav-btn:nth-child(1).active{color:var(--yellow);border-bottom-color:var(--yellow);}
  .nav-btn:nth-child(2).active{color:#e08000;border-bottom-color:#e08000;}
  .nav-btn:nth-child(3).active{color:#20b8a8;border-bottom-color:var(--teal);}
  .nav-btn:nth-child(4).active{color:#d07060;border-bottom-color:var(--salmon);}
  .nav-btn:hover:not(.active){color:var(--text);}

  /* ===== LAYOUT ===== */
  .main{display:none;padding:24px 28px;max-width:1400px;margin:0 auto;}
  .main.active{display:block;}

  /* ===== PANEL ===== */
  .panel{background:var(--surface);border:2px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);}

  .panel-header{
    padding:13px 18px;
    border-bottom:2px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
  }
  .panel-title{font-size:19px;font-weight:700;color:var(--text2);letter-spacing:0.06em;}
  @media(max-width:768px){.panel-title{font-size:15px;}}

  /* Yellow panel header */
  .panel.yellow .panel-header{background:linear-gradient(135deg,rgba(248,181,0,0.15),rgba(248,181,0,0.05));border-bottom-color:rgba(248,181,0,0.3);}
  .panel.yellow .panel-title{color:#b07800;}
  .panel.teal .panel-header{background:linear-gradient(135deg,rgba(64,224,208,0.15),rgba(64,224,208,0.05));border-bottom-color:rgba(64,224,208,0.3);}
  .panel.teal .panel-title{color:#158878;}
  .panel.salmon .panel-header{background:linear-gradient(135deg,rgba(243,166,150,0.2),rgba(243,166,150,0.05));border-bottom-color:rgba(243,166,150,0.3);}
  .panel.salmon .panel-title{color:#c05040;}

  /* ===== BUTTONS ===== */
  .btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:700;transition:all 0.15s;}
  .btn-yellow{background:var(--yellow);color:#fff;box-shadow:0 2px 8px rgba(248,181,0,0.4);}
  .btn-yellow:hover{background:#e0a000;transform:translateY(-1px);}
  .btn-teal{background:var(--teal);color:#fff;box-shadow:0 2px 8px rgba(64,224,208,0.4);}
  .btn-teal:hover{background:#30c8b8;transform:translateY(-1px);}
  .btn-salmon{background:var(--salmon);color:#fff;box-shadow:0 2px 8px rgba(243,166,150,0.4);}
  .btn-salmon:hover{background:#e09080;transform:translateY(-1px);}
  .btn-sm{padding:5px 12px;font-size:12px;}

  .icon-btn{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;transition:all 0.15s;}
  .icon-btn:hover{background:var(--surface2);color:var(--text);}
  .icon-btn.danger:hover{color:var(--danger);}
  .icon-btn.edit:hover{color:#20b8a8;}

  /* ===== INPUTS ===== */
  .inp,.sel,.txa{background:var(--bg);border:2px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color 0.2s;width:100%;}
  .inp:focus,.sel:focus,.txa:focus{border-color:var(--yellow);}
  .inp::placeholder{color:var(--text3);}
  .sel option{background:var(--surface);}
  .txa{resize:none;min-height:90px;line-height:1.6;overflow:hidden;}

  .input-row{padding:12px 14px;border-bottom:2px solid var(--border);display:flex;gap:8px;}

  /* ===== TASK LIST ===== */
  .task-list{padding:10px;min-height:120px;max-height:520px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .task-list::-webkit-scrollbar{width:5px;}
  .task-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  /* ===== TASK ITEM ===== */
  .task-item{
    padding:11px 14px;border-radius:10px;
    border:2px solid transparent;
    margin-bottom:6px;
    display:flex;align-items:flex-start;gap:10px;
    background:var(--bg);
    transition:all 0.15s;
  }
  .task-item[draggable="true"]{cursor:grab;user-select:none;-webkit-user-select:none;}
  .drag-handle{touch-action:none;user-select:none;-webkit-user-select:none;}
  .task-item[draggable="true"]:hover{border-color:var(--yellow);background:rgba(248,181,0,0.05);box-shadow:0 2px 8px rgba(248,181,0,0.15);}
  .task-item.dragging{opacity:0.35;cursor:grabbing;}
  .task-item.completed .task-name{text-decoration:line-through;color:var(--text3);}

  /* 倉庫トグル */
  .wh-toggle{width:20px;flex-shrink:0;font-size:11px;color:var(--text3);cursor:pointer;padding:2px;border-radius:4px;transition:color 0.15s;}
  .wh-toggle:hover{color:var(--yellow);}
  .wh-toggle-leaf{cursor:default;}
  .wh-parent{border-radius:10px;}
  .wh-children{background:rgba(248,181,0,0.03);border-left:3px solid rgba(248,181,0,0.25);margin-left:12px;margin-bottom:6px;border-radius:0 0 8px 8px;padding:4px 0 0 0;}
  .wh-child{background:transparent;border-color:transparent;margin-bottom:2px;}
  .wh-child:hover{background:rgba(248,181,0,0.05);border-color:rgba(248,181,0,0.2);}

  .drag-handle{color:var(--text3);font-size:14px;flex-shrink:0;margin-top:2px;user-select:none;}
  .task-content{flex:1;min-width:0;}
  .task-name{font-size:19px;color:var(--text);line-height:1.5;word-break:break-word;overflow-wrap:break-word;}
  @media(max-width:768px){.task-name{font-size:15px;}}
  .task-meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;}

  .tag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap;}
  .tag.dl{background:rgba(248,181,0,0.15);color:#b07800;border:1.5px solid rgba(248,181,0,0.4);}
  .tag.dl.overdue{background:rgba(224,80,80,0.12);color:var(--danger);border-color:rgba(224,80,80,0.4);}
  .tag.dl.soon{background:rgba(243,166,150,0.2);color:#c05040;border-color:rgba(243,166,150,0.5);}
  .tag.ptag{background:rgba(64,224,208,0.15);color:#158878;border:1.5px solid rgba(64,224,208,0.4);}
  .tag.misc{background:var(--surface2);color:var(--text2);border:1.5px solid var(--border);}

  .task-actions{display:flex;gap:4px;opacity:0;transition:opacity 0.15s;flex-shrink:0;}
  .task-item:hover .task-actions{opacity:1;}
  @media(max-width:768px){.task-actions{opacity:1;}}

  .task-name-link{cursor:pointer;color:inherit;border-bottom:1.5px dashed rgba(64,224,208,0.7);padding-bottom:1px;transition:color 0.15s,border-color 0.15s;}
  .task-name-link:hover{color:#158878;border-bottom-color:var(--teal);}

  /* ===== CHECK CIRCLE ===== */
  .check-circle{width:20px;height:20px;border-radius:50%;border:2.5px solid var(--border);flex-shrink:0;cursor:pointer;transition:all 0.15s;margin-top:1px;display:flex;align-items:center;justify-content:center;}
  .check-circle:hover{border-color:var(--teal);}
  .check-circle.on{background:var(--teal);border-color:var(--teal);}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCTudggTBn_AtfnYA3BUFdwX9AXi4dyoAQ",
  authDomain: "life-commander-7587a.firebaseapp.com",
  projectId: "life-commander-7587a",
  storageBucket: "life-commander-7587a.firebasestorage.app",
  messagingSenderId: "559216296461",
  appId: "1:559216296461:web:3254725817cedf96a48b44",
  measurementId: "G-FHYL75D908"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOC_REF = doc(db, "userdata", "main");

// Firestore保存
window._fsSave = async function(state) {
  try {
    const toSave = { tasks: state.tasks, memos: state.memos, goalText: state.goalText||'', trash: state.trash||[] };
    await setDoc(DOC_REF, toSave);
    // バックアップ世代管理（3世代）
    const backupRef = doc(db, "userdata", "backups");
    let backups = [];
    try {
      const bsnap = await getDoc(backupRef);
      backups = bsnap.exists() ? (bsnap.data().list||[]) : [];
    } catch(e){}
    backups.unshift({ savedAt: Date.now(), tasks: state.tasks, memos: state.memos, goalText: state.goalText||'' });
    if(backups.length>3) backups=backups.slice(0,3);
    await setDoc(backupRef, { list: backups });
    const el = document.getElementById('syncInd');
    if(el){ el.textContent='☁️ 同期済み'; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2000); }
  } catch(e) {
    const el = document.getElementById('syncInd');
    if(el){ el.textContent='⚠️ 同期失敗'; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3000); }
    console.error('Firestore save error:', e);
  }
};

// リアルタイムリスナー開始
const el = document.getElementById('syncInd');
if(el){ el.textContent='☁️ 同期中...'; el.classList.add('show'); }

onSnapshot(DOC_REF, (snap) => {
  // hasPendingWrites=true は自分の書き込みがサーバー反映前のローカルイベント → スキップ
  if(snap.metadata.hasPendingWrites) return;
  if(snap.exists()) {
    const data = snap.data();
    let local = {};
    try{ local = JSON.parse(localStorage.getItem('lifeCmd_v5')||'{}'); }catch(e){}
    const merged = { tasks: data.tasks||[], memos: data.memos||{}, images: local.images||{}, goalText: data.goalText||'' };
    localStorage.setItem('lifeCmd_v5', JSON.stringify(merged));
    if(window._onFsLoaded) window._onFsLoaded(merged);
    if(el){ el.textContent='☁️ 同期済み'; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2000); }
  } else {
    if(el){ el.classList.remove('show'); }
  }
}, (e) => {
  console.error('Firestore listen error:', e);
  if(el){ el.textContent='⚠️ 同期失敗'; el.classList.add('show'); }
});
</script>

    <div class="modal-title" id="schedModalTitle">🗓️ 予定を追加</div>
    <div class="fg"><label class="fl">タスク名 *</label><input class="inp" id="smName" placeholder="例：夕飯：カレー"></div>
    <div class="fg"><label class="fl">日付 *</label><input class="inp" type="date" id="smDate"></div>
    <div class="fg"><label class="fl">期限（任意）</label><input class="inp" type="date" id="smDl"></div>
    <div class="fg"><label class="fl">URL（任意）</label><input class="inp" id="smUrl" placeholder="https://..."></div>
    <div class="fg"><label class="fl">メモ（任意）</label><textarea class="inp txa" id="smMemo" placeholder="メモ" rows="3"></textarea></div>
    <div class="modal-actions">

      <button class="btn btn-teal" onclick="saveSchedModal()">保存</button>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLB()">
  <button class="lb-close" onclick="closeLB()">×</button>
  <img id="lbImg" src="" alt="" onclick="event.stopPropagation()">
</div>

<!-- ゴミ箱モーダル -->
<div class="modal-overlay" id="trashModal">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header">
      <span class="modal-title">🗑️ ゴミ箱（7日間保持）</span>
      <button class="modal-close" onclick="closeModal('trashModal')">×</button>
    </div>
    <div id="trashList" style="max-height:60vh;overflow-y:auto;padding:8px 0;"></div>
  </div>
</div>

<script>
// 3時基準で「今日」を判定
const _now=new Date();
const TODAY=new Date(_now);
if(_now.getHours()<3){TODAY.setDate(TODAY.getDate()-1);}
TODAY.setHours(0,0,0,0);
const DAYS=['日','月','火','水','木','金','土'];
function toStr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function todayStr(){return toStr(TODAY);}
function pad(n){return String(n).padStart(2,'0');}
function jpDate(s){if(!s)return'';const d=new Date(s+'T00:00:00');return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+DAYS[d.getDay()]+'）';}
function dayLabel(s){const d=new Date(s+'T00:00:00');const diff=Math.round((new Date(s+'T00:00:00')-TODAY)/86400000);const base=(d.getMonth()+1)+'/'+d.getDate()+'（'+DAYS[d.getDay()]+'）';if(diff===0)return'今日 '+base;if(diff===1)return'明日 '+base;return base;}
function dlDiff(s){if(!s)return null;return Math.round((new Date(s+'T00:00:00')-TODAY)/86400000);}

function loadState(){try{const r=localStorage.getItem('lifeCmd_v5');if(r)return JSON.parse(r);}catch(e){}return{tasks:[],memos:{},images:{},trash:[]};}
function saveState(){
  // ゴミ箱の7日以上前のタスクを自動クリア
  const cutoff=Date.now()-7*24*60*60*1000;
  if(S.trash)S.trash=S.trash.filter(t=>t._deletedAt&&t._deletedAt>cutoff);
  localStorage.setItem('lifeCmd_v5',JSON.stringify(S));
  const el=document.getElementById('saveInd');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500);
  if(window._fsSave) window._fsSave(S);
}

let S=loadState();
if(!S.tasks)S.tasks=[];if(!S.memos)S.memos={};if(!S.images)S.images={};if(!S.goalText)S.goalText='';if(!S.trash)S.trash=[];

// Firestoreから読み込んだデータで上書き更新するコールバック
window._onFsLoaded = function(data){
  S = data;
  if(!S.tasks)S.tasks=[];if(!S.memos)S.memos={};if(!S.images)S.images={};if(!S.goalText)S.goalText='';if(!S.trash)S.trash=[];
  const gt=document.getElementById('goalText');if(gt)gt.value=S.goalText||'';
  renderAll();
  checkAlerts();
};

function genId(){return Date.now()+'_'+Math.random().toString(36).slice(2,6);}
function getT(id){return S.tasks.find(t=>t.id===id);}
function kids(id){return S.tasks.filter(t=>t.parentId===id&&t.status!=='done');}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}

function saveGoal(el){
  S.goalText=el.value;
  localStorage.setItem('lifeCmd_v5',JSON.stringify(S));
  if(window._fsSave)window._fsSave(S);
}

function checkAlerts(){
  const tmrw=S.tasks.filter(t=>t.deadline&&t.status!=='done'&&dlDiff(t.deadline)===1);
  if(tmrw.length>0){document.getElementById('alertText').textContent='明日が期限！ '+tmrw.map(t=>`「${t.name}」`).join('、');document.getElementById('alertBanner').classList.add('show');}
}


function dlTag(dl){
  if(!dl)return'';
  const d=dlDiff(dl);let cls='tag dl',lbl;
  if(d<0){cls+=' overdue';lbl='⚠ 期限切れ';}
  else if(d===0){cls+=' soon';lbl='🔥 今日が期限';}
  else if(d===1){cls+=' soon';lbl='⏰ 明日が期限';}
  else if(d<=3){cls+=' soon';lbl='⏳ '+d+'日後が期限';}
  else{lbl='📅 '+dl;}
  return`<span class="${cls}">${lbl}</span>`;
}

function taskNameHtml(task,opts={}){
  const n=esc(task.name);
  const prefix=opts.prefix||'';
  const style=opts.style||'';
  if(task.url){
    return`<span class="task-name-link${style?' '+style:''}" onclick="event.stopPropagation();window.open('${esc(task.url)}','_blank')" title="${esc(task.url)}">${prefix}${n} <span style="font-size:11px;opacity:0.7">🔗</span></span>`;
  }
  return`<span class="task-name${style?' '+style:''}">${prefix}${n}</span>`;
}


const _memoTip=document.createElement('div');
_memoTip.className='memo-tooltip';
document.body.appendChild(_memoTip);
let _longTapTimer=null;

function attachMemoTip(el,memo){
  if(!memo)return;
  el.classList.add('has-memo');
  const bubble=document.createElement('div');
  bubble.className='memo-bubble';
  bubble.textContent=memo;
  el.appendChild(bubble);
  el.addEventListener('touchstart',e=>{
    _longTapTimer=setTimeout(()=>{
      const touch=e.touches[0];
      showMemoTip(memo,touch.clientX,touch.clientY);
    },500);
  },{passive:true});
  el.addEventListener('touchend',()=>clearTimeout(_longTapTimer),{passive:true});
  el.addEventListener('touchmove',()=>clearTimeout(_longTapTimer),{passive:true});
}
function showMemoTip(memo,x,y){
  _memoTip.textContent=memo;
  _memoTip.style.left=Math.min(x,window.innerWidth-280)+'px';
  _memoTip.style.top=Math.max(y-80,10)+'px';
  _memoTip.classList.add('show');
  setTimeout(()=>document.addEventListener('touchstart',hideMemoTip,{once:true,passive:true}),100);
}
function hideMemoTip(){_memoTip.classList.remove('show');}

// ===== WAREHOUSE =====
function renderWH(){
  const list=document.getElementById('whList');
  const roots=S.tasks.filter(t=>!t.parentId&&!t.scheduledDate&&!t.isRoutine&&t.status!=='done'&&!t.directTask&&(!t.todayDate||t.todayDate!==todayStr()));
  list.innerHTML='';
  if(roots.length===0){list.innerHTML='<div class="empty-state">アイデアをどんどん追加しましょう ✨<br>Enterキーでサクッと追加できます</div>';return;}
  roots.forEach(t=>{
    const childList=kids(t.id);
    const hasKids=childList.length>0;
    const alreadyToday=t.todayDate===todayStr();
    // 親 or 単独タスク行
    const row=document.createElement('div');
    row.className='task-item wh-parent';row.draggable=true;row.dataset.id=t.id;
    row.addEventListener('dragstart',onDS);row.addEventListener('dragend',onDE);
    row.innerHTML=`
      <span class="wh-toggle ${hasKids?'':'wh-toggle-leaf'}" data-id="${t.id}">${hasKids?'▶':''}</span>
      <div class="task-content">
        <div class="task-name">${taskNameHtml(t)}</div>
        <div class="task-meta">${dlTag(t.deadline)}</div>
      </div>
      <div class="task-actions">
        ${alreadyToday?'<span style="font-size:11px;color:var(--teal);font-weight:700;">✓今日</span>':`<button class="icon-btn" style="background:rgba(248,181,0,0.15);color:#b07800;border-color:rgba(248,181,0,0.4);" onclick="addToToday('${t.id}')" title="今日やるに追加">☀️</button>`}
        <button class="icon-btn edit" onclick="openAddChildModal('${t.id}')" title="子追加">＋</button>
        <button class="icon-btn edit" onclick="openEditModal('${t.id}')" title="編集">✎</button>
        <button class="icon-btn danger" onclick="delTask('${t.id}')" title="削除">✕</button>
      </div>`;
    list.appendChild(row);
    if(t.memo)attachMemoTip(row.querySelector('.task-content'),t.memo);

    if(hasKids){
      // 子タスクブロック（初期は折りたたみ）
      const childBlock=document.createElement('div');
      childBlock.className='wh-children';childBlock.dataset.parent=t.id;childBlock.style.display='none';
      childList.forEach(c=>{
        const crow=document.createElement('div');
        crow.className='task-item wh-child';crow.dataset.id=c.id;
        const cAlreadyToday=c.todayDate===todayStr();
        crow.innerHTML=`
          <span style="width:18px;color:#ccc;font-size:12px;">└</span>
          <div class="task-content">
            <div class="task-name" style="font-size:14px">${taskNameHtml(c)}</div>
            <div class="task-meta">${dlTag(c.deadline)}</div>
          </div>
          <div class="task-actions">
            ${cAlreadyToday?'<span style="font-size:11px;color:var(--teal);font-weight:700;">✓今日</span>':`<button class="icon-btn" style="background:rgba(248,181,0,0.15);color:#b07800;border-color:rgba(248,181,0,0.4);" onclick="addToToday('${c.id}')" title="今日やるに追加">☀️</button>`}
            <button class="icon-btn edit" onclick="openEditModal('${c.id}')" title="編集">✎</button>
            <button class="icon-btn danger" onclick="delTask('${c.id}')" title="削除">✕</button>
          </div>`;
        if(c.memo)attachMemoTip(crow.querySelector('.task-content'),c.memo);
        childBlock.appendChild(crow);
      });
      // ＋子タスク追加ボタン
      const addChild=document.createElement('button');
      addChild.className='add-btn';addChild.style.cssText='margin:4px 0 6px 28px;font-size:12px;';
      addChild.textContent='＋ 子タスクを追加';addChild.onclick=()=>openAddChildModal(t.id);
      childBlock.appendChild(addChild);
      list.appendChild(childBlock);

      // トグルクリック
      row.querySelector('.wh-toggle').addEventListener('click',e=>{
        e.stopPropagation();
        const isOpen=childBlock.style.display!=='none';
        childBlock.style.display=isOpen?'none':'block';
        e.currentTarget.textContent=isOpen?'▶':'▼';
        row.style.borderBottomLeftRadius=isOpen?'10px':'4px';
        row.style.borderBottomRightRadius=isOpen?'10px':'4px';
      });
    }
  });
}


// ===== TODAY =====
function renderToday(){
  // 先の予定で今日の日付になったタスクを自動で「今日やる」に移動
  let changed=false;
  S.tasks.forEach(t=>{
    if(t.scheduledDate===todayStr()&&t.todayDate!==todayStr()&&t.status!=='done'&&!t.isRoutine){
      t.todayDate=todayStr();t.status='doing';t.scheduledDate=null;changed=true;
    }
  });
  // directTaskは日付をまたいでも今日やるに持ち越す
  S.tasks.forEach(t=>{
    if(t.directTask&&t.status!=='done'&&t.todayDate&&t.todayDate!==todayStr()){
      t.todayDate=todayStr();changed=true;
    }
  });
  if(changed)saveState();
  const src=document.getElementById('todaySrc');src.innerHTML='';
  const notTd=S.tasks.filter(t=>!t.parentId&&!t.scheduledDate&&t.todayDate!==todayStr()&&!t.isRoutine&&!t.directTask&&t.status!=='done');
  const schedTd=S.tasks.filter(t=>t.scheduledDate===todayStr()&&t.todayDate!==todayStr());
  const all=[...notTd,...schedTd];
  if(all.length===0){src.innerHTML='<div class="empty-state">全タスクをボードに追加済み 🎉</div>';}
  else{
    all.forEach(task=>{
      const k=kids(task.id).filter(c=>c.todayDate!==todayStr());
      const hasK=k.length>0;
      const div=document.createElement('div');div.className='task-item';
      if(!hasK){
        div.draggable=true;div.dataset.id=task.id;
        div.addEventListener('dragstart',onDS);div.addEventListener('dragend',onDE);
      }
      else{div.style.opacity='0.6';div.style.cursor='default';}
      if(task.scheduledDate)div.style.borderLeft='4px solid var(--yellow)';
      div.innerHTML=`
        <span class="drag-handle" style="${hasK?'opacity:0.2':''}">⠿</span>
        <div class="task-content">
          <div class="task-name" style="${hasK?'font-size:12px;color:var(--text2)':''}">${taskNameHtml(task)}${hasK?' <span style="color:var(--text3);font-size:11px">（子タスクをドラッグ）</span>':''}</div>
          <div class="task-meta">${dlTag(task.deadline)}</div>
        </div>
        ${!hasK?`<div class="task-actions"><button class="icon-btn" style="background:rgba(248,181,0,0.15);color:#b07800;border-color:rgba(248,181,0,0.4);" onclick="addToToday('${task.id}')" title="今日やるに追加">☀️</button></div>`:''}`;
      src.appendChild(div);

      if(task.memo)attachMemoTip(div.querySelector('.task-content'),task.memo);
      k.forEach(c=>{
        const cd=document.createElement('div');cd.className='task-item subtask-indent';
        cd.draggable=true;cd.dataset.id=c.id;
        cd.addEventListener('dragstart',onDS);cd.addEventListener('dragend',onDE);
        cd.innerHTML=`<span class="drag-handle">⠿</span><div class="task-content"><div class="task-name" style="font-size:13px">${taskNameHtml(c)}</div><div class="task-meta">${dlTag(c.deadline)}</div></div><div class="task-actions"><button class="icon-btn" style="background:rgba(248,181,0,0.15);color:#b07800;border-color:rgba(248,181,0,0.4);" onclick="addToToday('${c.id}')" title="今日やるに追加">☀️</button></div>`;
        if(c.memo)attachMemoTip(cd.querySelector('.task-content'),c.memo);

        src.appendChild(cd);
      });
    });
  }
  // ルーティン列
  const routines=S.tasks.filter(t=>t.isRoutine);
  renderRoutineCol(routines);
  document.getElementById('cnt-routine').textContent=routines.length;

  const td=S.tasks.filter(t=>t.todayDate===todayStr()&&!t.isRoutine);
  const doing=td.filter(t=>t.status!=='done'),done=td.filter(t=>t.status==='done');
  renderCol('col-doing',doing);renderCol('col-done',done);
  document.getElementById('cnt-doing').textContent=doing.length;
  document.getElementById('cnt-done').textContent=done.length;
}

function renderRoutineCol(routines){
  const el=document.getElementById('col-routine');el.innerHTML='';
  if(routines.length===0){
    el.innerHTML='<div class="empty-state" style="padding:16px">毎朝のルーティンを<br>追加しましょう 🌅</div>';return;
  }
  routines.forEach(t=>{
    const div=document.createElement('div');
    div.className='task-item'+(t.routineDoneToday===todayStr()?' completed':'');
    div.innerHTML=`
      <div class="check-circle ${t.routineDoneToday===todayStr()?'on':''}" onclick="toggleRoutine('${t.id}')"></div>
      <div class="task-content"><div class="task-name">${taskNameHtml(t)}</div></div>
      <div class="task-actions">
        <button class="icon-btn edit" onclick="openEditModal('${t.id}')" title="編集">✎</button>
        <button class="icon-btn danger" onclick="delTask('${t.id}')" title="削除">✕</button>
      </div>`;
    el.appendChild(div);
  });
}

function toggleRoutine(id){
  const t=getT(id);if(!t)return;
  t.routineDoneToday = t.routineDoneToday===todayStr() ? null : todayStr();
  saveState();renderToday();
}

function addRoutine(){
  const inp=document.getElementById('routineInput');
  const name=inp.value.trim();if(!name)return;
  S.tasks.push({id:genId(),name,memo:'',deadline:null,parentId:null,scheduledDate:null,status:'todo',todayDate:null,completedDate:null,isRoutine:true,routineDoneToday:null});
  inp.value='';saveState();renderToday();
}

function addDirectTask(){
  const inp=document.getElementById('doingInput');
  const name=inp.value.trim();if(!name)return;
  S.tasks.push({id:genId(),name,memo:'',deadline:null,parentId:null,scheduledDate:null,status:'doing',todayDate:todayStr(),completedDate:null,directTask:true});
  inp.value='';saveState();renderToday();
}

function renderCol(colId,tasks){
  const el=document.getElementById(colId);el.innerHTML='';
  const isDone=colId==='col-done';
  if(tasks.length===0){
    if(!isDone){
      const dz=document.createElement('div');dz.className='drop-zone';dz.textContent='ここにドラッグ ✨';
      dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
      dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
      dz.addEventListener('drop',e=>onDropBoard(e,'doing'));
      el.appendChild(dz);
    } else {
      el.innerHTML='<div class="empty-state" style="padding:16px;font-size:13px">チェックすると<br>ここに移動します ✓</div>';
    }
    return;
  }
  tasks.forEach(t=>{
    const div=document.createElement('div');
    div.className='task-item'+(isDone?' completed':'')+(t.directTask?' direct-task':'');
    if(!isDone){
      div.draggable=true;div.dataset.id=t.id;
      div.addEventListener('dragstart',onDS);div.addEventListener('dragend',onDE);
      // iOS touch drag for reorder within col
      div.addEventListener('touchstart',e=>{dragId=t.id;dragSrcList=el;div.classList.add('dragging');},{passive:true});
      div.addEventListener('touchmove',e=>{
        e.preventDefault();
        const touch=e.touches[0];
        const after=getDragAfterElement(el,touch.clientY);
        if(after)el.insertBefore(div,after);else el.appendChild(div);
      },{passive:false});
      div.addEventListener('touchend',e=>{
        div.classList.remove('dragging');
        // persist new order
        const newOrder=[...el.querySelectorAll('.task-item[data-id]')].map(x=>x.dataset.id);
        const colTasks=newOrder.map(id=>getT(id)).filter(Boolean);
        const others=S.tasks.filter(x=>!newOrder.includes(x.id));
        S.tasks=[...others,...colTasks];
        saveState();dragId=null;
      },{passive:true});
    }
    div.innerHTML=`
      <div class="check-circle ${isDone?'on':''}" onclick="toggleDone('${t.id}')"></div>
      <div class="task-content">
        <div class="task-name">${taskNameHtml(t)}</div>
        <div class="task-meta">${dlTag(t.deadline)}</div>
      </div>
      <div class="task-actions">
        ${!isDone?`<button class="icon-btn edit" onclick="openEditModal('${t.id}')" title="編集">✎</button>`:''}
        <button class="icon-btn danger" onclick="${isDone?`removeFromToday('${t.id}')`:`delTask('${t.id}')`}" title="${isDone?'戻す':'外す'}">✕</button>
      </div>`;
    if(t.memo)attachMemoTip(div.querySelector('.task-content'),t.memo);
    el.appendChild(div);
  });
}

function toggleDone(id){const t=getT(id);if(!t)return;if(t.status==='done'){t.status='doing';t.completedDate=null;}else{t.status='done';t.completedDate=todayStr();}saveState();renderToday();}
function removeFromToday(id){const t=getT(id);if(!t)return;t.todayDate=null;t.status='todo';t.completedDate=null;saveState();renderToday();}

// ===== SCHEDULE =====
let schedDragId=null;

function renderSchedule(){
  const panel=document.getElementById('schedPanel');panel.innerHTML='';
  for(let i=1;i<=7;i++){
    const d=new Date(TODAY);d.setDate(d.getDate()+i);const s=toStr(d);
    const tasks=S.tasks.filter(t=>t.scheduledDate===s);const isT=i===0;
    const dd=document.createElement('div');dd.className='sched-day';dd.dataset.date=s;

    const hdr=document.createElement('div');hdr.className='sched-day-hdr';
    hdr.innerHTML=`<span class="sched-day-label ${isT?'today-lbl':''}">${dayLabel(s)}</span><span class="sched-cnt">${tasks.length}件</span>`;
    hdr.onclick=()=>toggleSD(hdr);

    const body=document.createElement('div');body.className='sched-day-body';body.dataset.date=s;

    // PC drag: dragover で並び替えプレビュー
    body.addEventListener('dragover',e=>{
      e.preventDefault();body.style.background='rgba(64,224,208,0.10)';
      if(!schedDragId)return;
      const after=getDragAfterElement(body,e.clientY);
      const draggingEl=body.querySelector('.task-item.dragging');
      // 別日からのドラッグ中は視覚フィードバックのみ
      if(!draggingEl)return;
      if(after)body.insertBefore(draggingEl,after);
      else{const btn=body.querySelector('.add-btn');if(btn)body.insertBefore(draggingEl,btn);else body.appendChild(draggingEl);}
    });
    body.addEventListener('dragleave',e=>{if(!body.contains(e.relatedTarget))body.style.background='';});
    body.addEventListener('drop',e=>{
      e.preventDefault();body.style.background='';
      if(!schedDragId)return;
      const task=getT(schedDragId);if(!task)return;
      // 日付を変更
      task.scheduledDate=s;
      // 現在のDOM順序で配列を並び替え
      const ids=[...body.querySelectorAll('.task-item[data-id]')].map(el=>el.dataset.id);
      ids.forEach(id=>{const t=getT(id);if(t)t.scheduledDate=s;});
      const others=S.tasks.filter(t=>!ids.includes(t.id));
      const ordered=ids.map(id=>getT(id)).filter(Boolean);
      S.tasks=[...others,...ordered];
      saveState();renderSchedule();renderSchedSrc();schedDragId=null;
    });

    tasks.forEach(t=>{
      const item=document.createElement('div');
      item.className='task-item';item.draggable=true;item.dataset.id=t.id;
      item.style.cssText='margin-bottom:6px;user-select:none;-webkit-user-select:none;';
      item.innerHTML=`
        <span class="drag-handle" style="touch-action:none;">⠿</span>
        <div class="task-content">
          <div class="task-name">${taskNameHtml(t)}</div>
          <div class="task-meta">${dlTag(t.deadline)}</div>
        </div>
        <div class="task-actions">
          <button class="icon-btn edit" onclick="openSchedEdit('${t.id}')">✎</button>
          <button class="icon-btn danger" onclick="delTask('${t.id}')">✕</button>
        </div>`;
      if(t.memo)attachMemoTip(item.querySelector('.task-content'),t.memo);

      // PC drag
      item.addEventListener('dragstart',e=>{

        item.style.opacity='';

        const touch=e.changedTouches[0];
        const el=document.elementFromPoint(touch.clientX,touch.clientY);
        const targetBody=el&&el.closest('.sched-day-body');
        if(targetBody){
          const targetDate=targetBody.closest('.sched-day').dataset.date;
          const task=getT(schedDragId);

            task.scheduledDate=targetDate;

            ids.forEach(id=>{const tt=getT(id);if(tt)tt.scheduledDate=targetDate;});

            const ordered=ids.map(id=>getT(id)).filter(Boolean);
            S.tasks=[...others,...ordered];
            saveState();renderSchedule();renderSchedSrc();
          }
        }
        schedDragId=null;
      },{passive:true});

      body.appendChild(item);
    });

    const addBtn=document.createElement('button');addBtn.className='add-btn';addBtn.textContent='＋ 予定を追加';addBtn.onclick=()=>openSchedAdd(s);

}

function renderSchedSrc(){
  const list=document.getElementById('schedSrc');if(!list)return;

  const allAvail=S.tasks.filter(t=>!t.scheduledDate&&!t.isRoutine&&t.status!=='done'&&!t.directTask&&(!t.todayDate||t.todayDate!==todayStr()));
  // 表示順: 親→直後に子
  const roots=allAvail.filter(t=>!t.parentId);
  const display=[];

    display.push({t:p,indent:false});
    allAvail.filter(c=>c.parentId===p.id).forEach(c=>display.push({t:c,indent:true}));

  allAvail.filter(t=>t.parentId&&!roots.find(r=>r.id===t.parentId)).forEach(c=>display.push({t:c,indent:false}));

  list.innerHTML='';

        <div class="task-meta">${dlTag(t.deadline)}</div>
      </div>`;

    // PC drag
    div.addEventListener('dragstart',e=>{schedDragId=t.id;div.classList.add('dragging');e.dataTransfer.effectAllowed='move';});

    // iOS touch drag
    div.addEventListener('touchstart',e=>{schedDragId=t.id;div.style.opacity='0.4';},{passive:true});
    div.addEventListener('touchmove',e=>{
      e.preventDefault();
      const touch=e.touches[0];
      const panel=document.getElementById('schedPanel');
      panel.querySelectorAll('.sched-day-body').forEach(b=>b.style.background='');
      const el=document.elementFromPoint(touch.clientX,touch.clientY);
      const targetBody=el&&el.closest('.sched-day-body');
      if(targetBody)targetBody.style.background='rgba(64,224,208,0.12)';
    },{passive:false});
    div.addEventListener('touchend',e=>{
      div.style.opacity='';
      const panel=document.getElementById('schedPanel');
      panel.querySelectorAll('.sched-day-body').forEach(b=>b.style.background='');
      const touch=e.changedTouches[0];
      const el=document.elementFromPoint(touch.clientX,touch.clientY);
      const targetBody=el&&el.closest('.sched-day-body');
      if(targetBody){
        const date=targetBody.closest('.sched-day').dataset.date;
        const task=getT(schedDragId);
        if(task){task.scheduledDate=date;saveState();renderSchedule();renderSchedSrc();}

  });
}

let dragId=null, dragSrcList=null;

function onDS(e){

// ドラッグ先のタスクの前後に挿入するためのヘルパー
function getDragAfterElement(container, y){
  const els=[...container.querySelectorAll('.task-item:not(.dragging)')];
  return els.reduce((closest,el)=>{
    const box=el.getBoundingClientRect();
    const offset=y-box.top-box.height/2;
    if(offset<0&&offset>closest.offset) return{offset,el};
    return closest;
  },{offset:-Infinity}).el;
}

function onDropWH(e){
  e.preventDefault();if(!dragId)return;
  const t=getT(dragId);if(!t)return;
  // 並び替え
  const after=getDragAfterElement(document.getElementById('whList'),e.clientY);
  const idx=S.tasks.findIndex(x=>x.id===dragId);
  S.tasks.splice(idx,1);
  if(after){
    const ai=S.tasks.findIndex(x=>x.id===after.dataset.id);
    S.tasks.splice(ai,0,t);
  } else {
    t.todayDate=null;t.status='todo';
    S.tasks.push(t);
  }
  saveState();renderAll();
}

function onDropBoard(e,col){
  e.preventDefault();if(!dragId)return;
  const t=getT(dragId);if(!t)return;
  // 倉庫→ボード
  if(!t.todayDate||t.todayDate!==todayStr()){
    t.todayDate=todayStr();
    t.status='doing';t.completedDate=null;
  } else {
    // ボード内並び替え：todayDateの順はtasks配列順で管理
    const colEl=document.getElementById('col-'+col);
    const after=getDragAfterElement(colEl,e.clientY);
    const idx=S.tasks.findIndex(x=>x.id===dragId);
    S.tasks.splice(idx,1);
    if(after){
      const ai=S.tasks.findIndex(x=>x.id===after.dataset.id);
      S.tasks.splice(ai,0,t);
    } else {
      S.tasks.push(t);
    }
  }
  saveState();renderToday();dragId=null;
}

function openTrash(){
  const list=document.getElementById('trashList');
  if(!S.trash||S.trash.length===0){
    list.innerHTML='<div class="empty-state" style="padding:24px">ゴミ箱は空です 🌸</div>';
  } else {
    list.innerHTML='';
    // 削除日時が新しい順
    const sorted=[...S.trash].sort((a,b)=>(b._deletedAt||0)-(a._deletedAt||0));
    sorted.forEach(t=>{
      const daysAgo=Math.floor((Date.now()-(t._deletedAt||0))/(1000*60*60*24));
      const daysLabel=daysAgo===0?'今日':(daysAgo+'日前');
      const d=document.createElement('div');
      d.className='task-item';d.style.marginBottom='6px';
      d.innerHTML=`
        <div class="task-content" style="flex:1;">
          <div class="task-name">${esc(t.name)}</div>
          <div class="task-meta" style="font-size:12px;color:var(--text3);">
            ${daysLabel}削除
            ${t.deadline?`　📅 ${t.deadline}`:''}
            ${t.memo?`　📝 ${esc(t.memo.slice(0,30))}${t.memo.length>30?'…':''}`:''}
          </div>
        </div>
        <button class="btn btn-sm" style="background:var(--teal);color:#fff;border:none;white-space:nowrap;" onclick="restoreFromTrash('${t.id}')">復元</button>`;
      list.appendChild(d);
    });
  }
  document.getElementById('trashModal').classList.add('open');
}
function restoreFromTrash(id){
  const idx=S.trash.findIndex(t=>t.id===id);if(idx===-1)return;
  const t=S.trash[idx];
  delete t._deletedAt;
  t.scheduledDate=null;t.todayDate=null;t.status='todo';
  S.tasks.push(t);
  S.trash.splice(idx,1);
  saveState();renderAll();
  openTrash();// 表示更新
}

  const isOpen=bar.classList.contains('open');
  if(isOpen){closeSearch();}
  else{bar.classList.add('open');document.getElementById('searchInp').focus();doSearch();}
}
function closeSearch(){
  document.getElementById('searchBar').classList.remove('open');
  document.getElementById('searchInp').value='';
  document.getElementById('searchResults').innerHTML='';
}
function highlight(text,q){
  if(!q)return esc(text);
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(re,'<mark>$1</mark>');
}
function taskStatus(t){
  if(t.isRoutine)return'🔁 ルーティン';
  if(t.status==='done')return'✅ 完了';
  if(t.todayDate===todayStr())return'☀️ 今日やる';
  if(t.scheduledDate)return'🗓️ 先の予定（'+t.scheduledDate+'）';
  return'📦 倉庫';
}
function doSearch(){
  const q=document.getElementById('searchInp').value.trim();
  const res=document.getElementById('searchResults');
  if(!q){res.innerHTML='';return;}
  const ql=q.toLowerCase();
  const hits=S.tasks.filter(t=>
    (t.name&&t.name.toLowerCase().includes(ql))||
    (t.memo&&t.memo.toLowerCase().includes(ql))
  );
  if(hits.length===0){res.innerHTML=`<div class="search-empty">「${esc(q)}」に一致するタスクはありません</div>`;return;}
  res.innerHTML='';
  hits.forEach(t=>{
    const div=document.createElement('div');div.className='search-result-item';
    const parent=t.parentId?getT(t.parentId):null;
    div.innerHTML=`
      <div class="search-result-name">${parent?`<span style="color:var(--text3);font-size:12px">${esc(parent.name)} › </span>`:''}${highlight(t.name,q)}</div>
      <div class="search-result-meta">
        <span>${taskStatus(t)}</span>
        ${t.deadline?`<span>📅 ${t.deadline}</span>`:''}
        ${t.memo?`<span>📝 ${highlight(t.memo.slice(0,40),q)}${t.memo.length>40?'…':''}</span>`:''}
      </div>`;
    div.onclick=()=>{openEditModal(t.id);};
    res.appendChild(div);
  });
}


document.getElementById('headerDate').textContent=TODAY.getFullYear()+'年'+(TODAY.getMonth()+1)+'月'+TODAY.getDate()+'日（'+DAYS[TODAY.getDay()]+'）';
document.getElementById('mName').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.isComposing)saveTaskModal();});
document.getElementById('smName').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.isComposing)saveSchedModal();});
initDeadlineInput('mDl');
initDeadlineInput('smDl');
initDeadlineInput('smDate');
const _gt=document.getElementById('goalText');if(_gt)_gt.value=S.goalText||'';
checkAlerts();renderToday();
</script>
